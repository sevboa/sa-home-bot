# Пример конфигурации sa-home-bot.
# Скопируйте в config.toml и подставьте свои значения.
# Любое значение можно переопределить переменной окружения с префиксом
# SENTINEL__ и разделителем вложенности "__", например:
#   SENTINEL__TELEGRAM__TOKEN=123:abc
# Подписки задаются ТОЛЬКО в TOML.

[telegram]
token = "PUT-YOUR-BOT-TOKEN-HERE"

[database]
path = "./data/sentinel.sqlite"

[schedule]
scan_cron = "*/1 * * * *"          # снимать температуру датчиков раз в минуту
smart_cron = "0 * * * *"           # снимок SMART-счётчиков дисков раз в час
housekeeping_cron = "0 3 * * *"    # уборка ночью

[sensors.cpu]
enabled = true
warn_c = 80.0
crit_c = 90.0
hysteresis_delta_c = 5.0            # обратно в ok при temp < warn - delta
consecutive_to_alert = 3
consecutive_to_clear = 3
# Политика порогов: "fixed" (по умолчанию) — жёсткие warn/crit выше.
# "baseline" — адаптивный порог: копит историю показаний в БД и алертит на
# аномальное отклонение вверх. Порог = min(warn_c, mean + k_sigma*max(std, min_std)),
# то есть baseline только опускает порог (ловит перегрев раньше на холодной машине),
# warn_c остаётся верхней страховкой. Пока накоплено < baseline_min_samples — fixed.
mode = "fixed"                      # fixed | baseline
baseline_window = 240              # сколько последних показаний брать в статистику
baseline_min_samples = 30          # минимум истории, иначе холодный старт (fixed)
baseline_k_sigma = 4.0             # порог = mean + k_sigma * std
baseline_min_std_c = 3.0           # нижняя граница std (защита от слишком узкого окна)

[sensors.disks]
enabled = true
warn_c = 55.0
crit_c = 65.0
hysteresis_delta_c = 5.0
consecutive_to_alert = 2
consecutive_to_clear = 2
mode = "fixed"                      # fixed | baseline (см. [sensors.cpu])
baseline_window = 240
baseline_min_samples = 30
baseline_k_sigma = 4.0
baseline_min_std_c = 3.0
# Пусто = автоопределение через `smartctl --scan` (тип адаптера -d берётся оттуда).
# Можно задать вручную "устройство:тип", если автоскан определяет тип неверно —
# например USB-мост JMicron без -d отдаёт temperature: null:
#   devices = ["/dev/sda:sntjmicron", "/dev/sdb:sat"]
# eMMC (/dev/mmcblk*) и подобные без SMART пропускаются автоматически.
devices = []

# Служба monitor (отдельный процесс: `sa-home-bot --service monitor`).
# Бот общается с ней по протоколу v0 (см. PROTOCOL.md). socket — endpoint:
# unix-путь (Linux) или "tcp://127.0.0.1:8711" (Windows; требует [swarm].token).
# У монитора СВОЯ БД — [database].path остаётся боту.
[monitor]
socket = "./data/monitor.sock"
db_path = "./data/monitor.sqlite"

# Служба apps (адаптер приложений: `sa-home-bot --service apps`) — умения роя
# поверх готового софта (торрент-клиент, медиасервер): по протоколу отвечает
# состоянием systemd-юнита и ссылками на веб-морду. Каждое приложение — скилл
# первого уровня в /skills; право в подписке — "<id>@apps".
[apps]
socket = "./data/apps.sock"

[[apps.items]]
id = "qbittorrent"
title = "🧲 qBittorrent"
unit = "qbittorrent-nox.service"   # системный systemd-юнит
urls = ["http://192.168.0.100:8080"]

[[apps.items]]
id = "jellyfin"
title = "🎬 Jellyfin"
unit = "jellyfin.service"
urls = ["http://192.168.0.100:8096"]

# Сервис ноды (супервизор: `sa-home-bot --service node`, консоль — nodectl).
# Нода запускает назначенные службы дочерними процессами и рестартит упавшие.
# id — имя ноды в рое (пусто = hostname). Умения питания (poweroff/reboot/
# suspend) объявляются в describe автоматически; в боте право — "<...>@node".
# listen — дополнительный endpoint для пиров роя (нода слушает оба):
# unix-сокет остаётся локальным фронтендам, tcp — межнодовому каналу.
[node]
#id = "alfred"
socket = "./data/node.sock"
#listen = "tcp://<tailscale-ip>:8710"   # требует [swarm].token
assignments = ["monitor", "apps", "telegram-bot"]
restart_delay_s = 5.0              # пауза перед перезапуском упавшей службы
stop_timeout_s = 90.0              # SIGTERM → SIGKILL при остановке

# Общие параметры роя. token — общий секрет: обязателен для служб на
# TCP-endpoint'ах (Windows-нода, межнодовый канал), unix-сокеты его не требуют.
# Сгенерировать: `python3 -c "import secrets; print(secrets.token_urlsafe(32))"`.
# Один и тот же токен должен стоять на всех нодах роя.
[swarm]
token = ""

# Удалённые ноды роя (discovery «на минималках» — статический список).
# id — hostname ноды (dst.node в конверте), endpoint — её сервис ноды.
# Запрос к чужой ноде шлётся своей ноде, та пересылает сама («спроси любого»);
# свой id в списке игнорируется — конфиг роя можно держать общим.
#[[swarm.nodes]]
#id = "winpc"
#endpoint = "tcp://winpc.tailXXXXXX.ts.net:8710"

# Wake-on-LAN: /wake шлёт magic packet на MAC машины в локальной сети.
# На стороне Windows должно быть включено: WoL в BIOS/UEFI, «Wake on Magic Packet»
# в свойствах сетевого адаптера, и выключен «быстрый запуск» (Fast Startup).
[wake]
mac = ""                           # пусто = функция выключена, напр. "AA:BB:CC:DD:EE:FF"
ip = ""                            # опционально: если задан, /wake проверит ping до и после
broadcast = "255.255.255.255"      # broadcast-адрес подсети, напр. "192.168.0.255"
port = 9                           # стандартный порт WoL (7 или 9)
wait_timeout_s = 120.0             # сколько ждать ответа на ping после пробуждения

[logging]
level = "INFO"
format = "plain"                   # plain | json

# --- Подписки (тихих часов нет) ---

# Типы событий: overheat_started, overheat_cleared (температура),
#               smart_degraded, smart_recovered (SMART-здоровье дисков),
#               system (старт/останов/восстановление связи). "*" = все.

# allowed_commands: имена команд бота (nodes, status, wake, ...) и права на
# динамические действия служб в форме "действие@служба" (из describe):
#   <id>@apps (qbittorrent@apps, ...) — скилл-приложение: команда в меню бота;
#   start@node / stop@node / restart@node — управление службой на её карточке;
#   restart_node@node — перезапуск самой ноды-супервизора (не путать с restart
#   службы); poweroff/reboot/suspend@node — питание машины. Право не зависит
#   от того, чья это физически нода (ARCHITECTURE §11 п. 1) — работает
#   одинаково и на своей карточке, и на карточке любого пира.
# Голое имя действия (scan_now) даёт и текстовую команду, и кнопку у любой службы.
[[subscriptions]]
name = "me"
chat_id = 123456789
event_types = ["*"]                # всё: перегрев + SMART + система
allowed_commands = [
    "nodes", "status", "status_full", "stats", "downtime",
    "scan_now", "start@node", "stop@node", "restart@node", "restart_node@node",
    "poweroff@node", "reboot@node", "suspend@node",
    "qbittorrent@apps", "jellyfin@apps",
]

[[subscriptions]]
name = "family_room"
chat_id = -1009999999
event_types = ["overheat_started", "overheat_cleared", "smart_degraded"]
allowed_commands = []
